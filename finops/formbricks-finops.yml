meters:
- name: plan_subscription
  description: Flat monthly subscription fee for the active Cloud plan (Pro, Scale).
  unit: months
  aggregation: sum
  dimensions:
  - account
  - plan
- name: monthly_responses
  description: Survey responses collected in the billing month, measured against the plan allowance.
  unit: responses
  aggregation: sum
  dimensions:
  - account
  - survey
  - environment
- name: workspaces
  description: Workspaces in use, capped per plan (1 Hobby, 3 Pro, 5 Scale).
  unit: workspaces
  aggregation: max
  dimensions:
  - account
- name: contacts
  description: Identified contacts under management, used for segmentation on paid plans.
  unit: contacts
  aggregation: max
  dimensions:
  - account
  - environment
- name: self_hosted_infrastructure
  description: Compute, database, and object-storage cost of operating the self-hosted Community Edition.
  unit: hours
  aggregation: sum
  dimensions:
  - deployment
principles:
- name: Visibility
  description: Track monthly response volume per environment against the plan allowance to anticipate overage or upgrade triggers.
- name: Allocation
  description: Use workspaces and environments to map survey programs to teams and cost centers.
- name: Optimization
  description: Self-host the AGPLv3 Community Edition for high-volume, cost-sensitive use; on Cloud, right-size the plan to actual monthly response volume and consolidate workspaces.
- name: Accountability
  description: Assign owners per workspace/survey program and review response volume and plan fit monthly against budget.
maintainers:
