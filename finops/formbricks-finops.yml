alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
publisherName: Formbricks
serviceCategory: Analytics and Experience Management
billingModel:
  pricingCategory: Subscription-Based
  billingFrequency: Monthly
  billingCurrency: USD
  chargeCategories:
  - Purchase
  - Usage
  - Adjustment
focusColumns:
  ServiceName: Formbricks Cloud
  ServiceCategory: Analytics and Experience Management
  ProviderName: Formbricks
  PublisherName: Formbricks
  InvoiceIssuerName: Formbricks
  BillingCurrency: USD
  ChargeCategory: Purchase
