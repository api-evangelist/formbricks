- Forms
- Open Source
- FinOps
- Cost Management
- FOCUS
description: >-
  FinOps view of Formbricks spend. Formbricks Cloud bills a flat monthly
  subscription per plan (Hobby free, Pro, Scale) with a bundled monthly
  response allowance and per-workspace and per-feature gating; Enterprise is a
  negotiated contract. The open-source Community Edition has no license fee
  (AGPLv3) and shifts cost to self-hosted infrastructure (compute, database,
  object storage, and operations). The primary cost driver on Cloud is the
  monthly response volume relative to plan tier.
notes: >-
  Subscription prices and response allowances are subject to change; verify
  against the Formbricks pricing page during reconciliation. Self-hosted cost
  is infrastructure-and-ops driven, not a Formbricks invoice.
sources:
- https://formbricks.com/pricing
- https://formbricks.com/docs
- https://github.com/formbricks/formbricks
